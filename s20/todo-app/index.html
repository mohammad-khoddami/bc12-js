<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="./main.css" rel="stylesheet" />
        <title>ToDo App</title>
    </head>
    <body onload="load()">
        <div class="wrapper">
            <div class="task-input">
                <img src="./assets/bars-icon.svg" alt="icon" />
                <input
                    type="text"
                    id="task-input-tag"
                    placeholder="Add a new task"
                    onkeyup="addTask(event)"
                />
            </div>
            <div class="controls">
                <div class="filters" id="filters">
                    <span id="all" onclick="printTask()">All</span>
                    <span id="pending" onclick="printTask('pending')"
                        >Pending</span
                    >
                    <span id="complete" onclick="printTask('complete')"
                        >Completed</span
                    >
                </div>
                <button
                    class="clear-btn"
                    id="clear-btn"
                    onclick="clearBtn(event)"
                >
                    Clear All
                </button>
            </div>
            <ul id="task-list-tag" class="task-box"></ul>
        </div>
        <script src="./app.js"></script>
    </body>
</html>
